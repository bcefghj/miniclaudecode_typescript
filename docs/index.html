<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>miniclaudecode_typescript — 从源码蒸馏 Claude Code</title>
  <meta name="description" content="Claude Code 50万行TypeScript源码蒸馏为12阶段教学项目">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #6366f1;
      --sidebar-width: 280px;
    }
    .sidebar-nav li a {
      font-size: 14px;
    }
    .app-name-link img {
      max-width: 60px;
    }
    .markdown-section img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      margin: 16px 0;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .cover-main {
      color: #333;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'miniclaudecode_typescript',
      repo: 'https://github.com/bcefghj/miniclaudecode_typescript',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索文档',
        noData: '没有找到结果',
        depth: 3,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '失败',
        successText: '已复制!'
      },
      pagination: {
        previousText: '上一节',
        nextText: '下一节',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
